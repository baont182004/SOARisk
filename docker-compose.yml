services:
  redis:
    image: redis:7-alpine
    container_name: soc-soar-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: soc-soar-api
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-soc_soar}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      API_PORT: ${API_PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '${API_PORT:-3001}:3001'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: soc-soar-worker
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-soc_soar}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    container_name: soc-soar-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      api:
        condition: service_started
    ports:
      - '3000:3000'
